name: CD Python Project

on:
  workflow_dispatch:
    inputs:
      build_path:
        description: 'Path to the directory to zip'
        required: true
        default: 'AULA_DEVOPS'
  push:
    branches:
      - main


jobs:

  CriarDiretorio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          filename: release.zip        # nome do arquivo zip
          path: AULA_DEVOPS            # diretório a ser compactado (relativo ao repositório)
          type: zip

      - name: Commit release.zip
        run: |
            git add release.zip
            git commit -m "Add release.zip generated by workflow" || echo "No changes to commit"
            git push

  upload:
    needs: CriarDiretorio
    runs-on: ubuntu-latest
    steps:
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: AULA_DEVOPS/release.zip
          if-no-files-found: error

      - name: Mensagem de sucesso
        run: echo "Upload com sucesso"