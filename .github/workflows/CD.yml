name: CD Python Project

on:
  workflow_dispatch:
    inputs:
      build_path:

        required: true
        default: 'AULA_DEVOPS'
  push:
    branches:
      - main


jobs:


  Upload:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: cria o zip
        uses: thedoctor0/zip-release@master
        with:
            filename: release-${{ github.run_number }}        # nome do arquivo zip
            path: ${{ github.event.inputs.build_path }}   # usa o input do workflow
            type: zip

      - name: Save release.zip
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.run_number }}.zip
          path: release-${{ github.run_number }}.zip

      - name: Commit release.zip
        run: |
            git config --global user.email "rogerfluz@live.com"
            git config --global user.name "rogerluz"
            git add release-${{ github.run_number }}.zip
            git commit -m "adicionando o zip ao main"
            git push
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  Download:
    needs: Upload
    runs-on: windows-latest
    steps:
      - name: Download release.zip
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.run_number }}

      - name: Mensagem de sucesso
        run: echo "Upload e download executado com sucesso"