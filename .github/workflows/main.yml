name: CI Python Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Debug repo and pytest collection
        run: |
          echo "PWD: $(pwd)"
          ls -la
          ls -la tests || true
          find . -type f -name "test_*.py" -o -name "*_test.py" -print || true
          cat pytest.ini || true
          pytest --collect-only -q || true

      - name: Run tests
        run:
          pytest -q -s
